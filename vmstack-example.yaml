version: "1"

# vm_root: "C:\HyperV\VMs"   # optional: override default VM storage root (default: C:\HyperV\VMs)

networks:
  # Each network entry maps a logical name to an existing Hyper-V Virtual Switch.
  # The switch must already exist — vm-compose does NOT create switches.
  # Use "Default Switch" for automatic NAT + DHCP (built into Windows 10/11/Server).
  natnet:
    switch_name: "Default Switch"
  bridge:
    switch_name: "External"
  # Example custom switch:
  # corpnet:
  #   switch_name: "External-Corp"

storage:
  shareddata:
    path: "storage/shareddata.vhdx"
    size_gb: 100

vms:
  winhost1:
    iso: "C:/ISOs/SERVER_EVAL_x64FRE_en-us.iso"
    # product_key: "XXXXX-XXXXX-XXXXX-XXXXX-XXXXX"   # optional: activate + convert from Eval ISO to full edition
    # product_type: "WINDOWS SERVER 2022 STANDARD"    # required with product_key; used by DISM to set edition
    # product_notes: "use dism to convert from eval to retail"  # informational only
    # admin_password: "YourPassword123"        # optional; if omitted a random 20-char password is generated and printed once
    memory_gb: 8
    cpus: 4
    os_disk_gb: 80
    persistent_disk_gb: 50
    network: external
    mac_address: "00:15:5D:AB:CD:01"   # optional — omit for dynamic MAC
    mount:
      - shareddata

  winhost2:
    iso: "C:/ISOs/SERVER_EVAL_x64FRE_en-us.iso"
    memory_gb: 4
    cpus: 2
    os_disk_gb: 60
    persistent_disk_gb: 30
    network: natnet
    # mac_address: "00:15:5D:AB:CD:02"   # uncomment to pin MAC
    mount:
      - shareddata