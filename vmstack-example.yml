version: "1"

networks:
  natnet:
    type: nat
    switch_name: "hv-nat"
    subnet: "192.168.200.0/24"
    gateway: "192.168.200.1"

storage:
  shareddata:
    path: "storage/shareddata.vhdx"
    size_gb: 100

vms:
  winhost1:
    iso: "D:/ISO/WindowsServer2022.iso"
    memory_gb: 8
    cpus: 4
    os_disk_gb: 80
    persistent_disk_gb: 50
    network: natnet
    mirantis_url: "https://download.mirantis.com/runtime/mcr-23.0.0.msi"
    mount:
      - shareddata

  winhost2:
    iso: "D:/ISO/WindowsServer2025.iso"
    memory_gb: 4
    cpus: 2
    os_disk_gb: 60
    persistent_disk_gb: 30
    network: natnet
    mirantis_url: "https://download.mirantis.com/runtime/mcr-23.0.0.msi"
    mount:
      - shareddata